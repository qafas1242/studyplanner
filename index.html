<!DOCTYPE HTML>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='//spoqa.github.io/spoqa-han-sans/css/SpoqaHanSansNeo.css' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="flatpickr_style.css">

    <!-- datetime picker -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <!-- 불러온 아이콘들 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add,calendar_today,close,flag_2,login,logout,person,save,warning">
    <title>Study Planner</title>
</head>
<body>
    <header>
        <h1>Study Planner</h1>
        <div id="notloginwarning"></div>
        <button id="accountbutton"><span class="material-symbols-rounded">person</span></button>
    </header>

    <div id="accountmenu">
        <span id="logineduser">Username</span>
        <button id="login"><span class="material-symbols-rounded">login</span> 로그인</button>
        <button id="logout"><span class="material-symbols-rounded">logout</span> 로그아웃</button>
        <button id="save"><span class="material-symbols-rounded">save</span> 데이터 저장</button>
    </div>

    <div class="inputrow" >
        <input type="text" id="taskinput" placeholder="할 일을 입력하세요">
         <div id="taskdate-wrap" data-wrap>
            <span class="material-symbols-rounded">calendar_today</span>
            <input type="text" id="taskdate" placeholder="예정일..." data-input>
        </div>
        <div id="taskdue-wrap" data-wrap>
            <span class="material-symbols-rounded">flag_2</span>
            <input type="text" id="taskdue" placeholder="마감일..." data-input>
        </div>
        <button id="addtaskbutton"><span class="material-symbols-rounded">add</span></button>
    </div>

    <div id="separator"></div>

    <ul id="tasklist">
        <!-- 여기에는 JS를 통해 task이 추가됨 -->
    </ul>

    <div id="warnings">
        <!-- 여기에는 JS를 통해 warning이 추가됨 -->
    </div>

    <div id="flatpickr">
        <!-- 여기에는 flatpickr을 통해 날짜 선택기가 추가됨 -->
    </div>

    
    <script src="script.js" type="module"></script>
    <script> 
        flatpickr("#taskdue-wrap", {
            wrap: true,
            dateFormat: "Y-m-d",
            disableMobile: true,
            altInput: true,
            altFormat: "m월 d일",
            altInputClass: "taskdue-alt",
            appendTo: document.getElementById('flatpickr')
        });
        flatpickr("#taskdate-wrap", {
            wrap: true,
            dateFormat: "Y-m-d",
            disableMobile: true,
            altInput: true,
            altFormat: "m월 d일",
            altInputClass: "taskdate-alt",
            appendTo: document.getElementById('flatpickr')
        });
    </script>
</body>
</html>
